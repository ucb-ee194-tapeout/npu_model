# Run tests on push and pull requests.
# Tests execution of all NPU programs and arch state.
name: Tests

env:
  PYTHON_VERSION: "3.14"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install $PYTHON_VERSION

      - name: Install dependencies
        run: uv sync --python $PYTHON_VERSION

      - name: Run pytest suite
        run: uv run --python $PYTHON_VERSION pytest --max-cycles 100000
